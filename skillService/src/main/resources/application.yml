server:
  port: 8083

spring:
  application:
    name: SKILL-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3307/skill_db?createDatabaseIfNotExist=true
    username: root
    password: tanisha
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.skillsync.skillService

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true