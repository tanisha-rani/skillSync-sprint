<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">SkillSync Deployment Architecture</title>
  <desc id="desc">Runtime deployment diagram showing browser, Vite dev server, API gateway, Docker Compose services, Eureka, Config Server, MySQL, RabbitMQ, and Zipkin.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #94a3b8; stroke-width: 3; }
      .title { font: 800 38px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 20px Arial, sans-serif; fill: #111827; }
      .small { font: 17px Arial, sans-serif; fill: #334155; }
      .tiny { font: 14px Arial, sans-serif; fill: #475569; }
      .external { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; }
      .gateway { fill: #fce7f3; stroke: #db2777; stroke-width: 2.5; }
      .service { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2.2; }
      .infra { fill: #eef2ff; stroke: #6366f1; stroke-width: 2.2; }
      .db { fill: #dbeafe; stroke: #2563eb; stroke-width: 2.3; }
      .queue { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.3; }
      .arrow { stroke: #334155; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 8; }
      .trace { stroke: #7c3aed; stroke-width: 1.8; fill: none; marker-end: url(#purpleArrow); stroke-dasharray: 5 7; opacity: .6; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="purpleArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect class="bg" width="1500" height="980"/>
  <text class="title" x="60" y="72">SkillSync Deployment / Runtime Architecture</text>
  <text class="small" x="62" y="105">Local development and Docker Compose view</text>

  <rect class="external" x="70" y="210" width="190" height="95" rx="15"/>
  <text class="label" x="125" y="250">Browser</text>
  <text class="small" x="107" y="280">React UI</text>

  <rect class="external" x="340" y="195" width="240" height="125" rx="16"/>
  <text class="label" x="395" y="235">Vite Dev Server</text>
  <text class="small" x="382" y="266">Frontend app</text>
  <text class="tiny" x="372" y="292">/api proxy to 8080</text>

  <path class="arrow" d="M260 258 L335 258"/>
  <text class="tiny" x="270" y="238">localhost:5173</text>

  <rect class="panel" x="650" y="135" width="775" height="770" rx="24"/>
  <text class="label" x="690" y="180">Docker Compose Runtime</text>

  <rect class="gateway" x="710" y="225" width="250" height="105" rx="15"/>
  <text class="label" x="755" y="265">skillsync-gateway</text>
  <text class="small" x="770" y="295">API Gateway :8080</text>

  <path class="arrow" d="M580 258 L705 275"/>
  <text class="tiny" x="590" y="238">http://localhost:8080</text>

  <rect class="infra" x="1060" y="205" width="250" height="90" rx="14"/>
  <text class="label" x="1112" y="240">Eureka Server</text>
  <text class="small" x="1110" y="270">skillsync-discovery :8761</text>

  <rect class="infra" x="1060" y="325" width="250" height="90" rx="14"/>
  <text class="label" x="1115" y="360">Config Server</text>
  <text class="small" x="1105" y="390">central YAML :8888</text>

  <g id="services">
    <rect class="service" x="710" y="395" width="180" height="80" rx="13"/>
    <text class="label" x="740" y="428">Auth</text>
    <text class="small" x="738" y="455">8087 / auth_db</text>

    <rect class="service" x="920" y="395" width="180" height="80" rx="13"/>
    <text class="label" x="958" y="428">User</text>
    <text class="small" x="948" y="455">8081 / users_db</text>

    <rect class="service" x="1130" y="455" width="180" height="80" rx="13"/>
    <text class="label" x="1162" y="488">Mentor</text>
    <text class="small" x="1153" y="515">8082 / mentor_db</text>

    <rect class="service" x="710" y="505" width="180" height="80" rx="13"/>
    <text class="label" x="753" y="538">Skill</text>
    <text class="small" x="742" y="565">8083 / skill_db</text>

    <rect class="service" x="920" y="505" width="180" height="80" rx="13"/>
    <text class="label" x="950" y="538">Session</text>
    <text class="small" x="938" y="565">8084 / session_db</text>

    <rect class="service" x="1130" y="565" width="180" height="80" rx="13"/>
    <text class="label" x="1170" y="598">Group</text>
    <text class="small" x="1155" y="625">8085 / group_db</text>

    <rect class="service" x="710" y="615" width="180" height="80" rx="13"/>
    <text class="label" x="748" y="648">Review</text>
    <text class="small" x="737" y="675">8086 / review_db</text>

    <rect class="service" x="920" y="615" width="205" height="80" rx="13"/>
    <text class="label" x="955" y="648">Notification</text>
    <text class="small" x="945" y="675">8089 / notifications_db</text>
  </g>

  <path class="arrow" d="M835 330 L800 390"/>
  <path class="arrow" d="M860 330 L1010 390"/>
  <path class="arrow" d="M910 330 L1210 450"/>
  <path class="arrow" d="M820 330 L800 500"/>
  <path class="arrow" d="M880 330 L1010 500"/>
  <path class="arrow" d="M930 330 L1210 560"/>
  <path class="arrow" d="M790 330 L800 610"/>
  <path class="arrow" d="M850 330 L1018 610"/>
  <text class="tiny" x="725" y="360">load-balanced route targets</text>

  <path class="soft" d="M960 275 L1055 250"/>
  <path class="soft" d="M890 395 L1055 250"/>
  <path class="soft" d="M1010 395 L1120 295"/>
  <path class="soft" d="M1220 455 L1185 295"/>
  <path class="soft" d="M800 505 L1080 295"/>
  <path class="soft" d="M1010 505 L1160 295"/>
  <path class="soft" d="M1220 565 L1220 295"/>
  <path class="soft" d="M800 615 L1130 295"/>
  <path class="soft" d="M1018 615 L1260 295"/>
  <text class="tiny" x="1088" y="190">registration and discovery</text>

  <path class="soft" d="M1060 370 L960 300"/>
  <path class="soft" d="M1060 370 L800 395"/>
  <path class="soft" d="M1060 370 L1010 395"/>
  <path class="soft" d="M1185 415 L1220 455"/>
  <path class="soft" d="M1060 390 L800 505"/>
  <path class="soft" d="M1085 415 L1010 505"/>
  <path class="soft" d="M1220 415 L1220 565"/>
  <path class="soft" d="M1080 415 L800 615"/>
  <path class="soft" d="M1110 415 L1018 615"/>
  <text class="tiny" x="1080" y="435">Backend/config-repo</text>

  <path class="db" d="M760 785 C760 755 1065 755 1065 785 L1065 850 C1065 880 760 880 760 850 Z"/>
  <ellipse class="db" cx="912" cy="785" rx="152" ry="30"/>
  <text class="label" x="835" y="820">skillsync-mysql</text>
  <text class="small" x="835" y="848">3307 -&gt; 3306</text>

  <rect class="queue" x="1120" y="760" width="230" height="95" rx="14"/>
  <text class="label" x="1178" y="798">RabbitMQ</text>
  <text class="small" x="1150" y="828">5672 / 15672</text>

  <rect class="infra" x="1120" y="655" width="230" height="75" rx="14"/>
  <text class="label" x="1188" y="688">Zipkin</text>
  <text class="small" x="1167" y="713">Tracing :9411</text>

  <path class="arrow" d="M800 475 C790 620 820 710 870 755"/>
  <path class="arrow" d="M1010 475 C980 620 955 710 930 755"/>
  <path class="arrow" d="M1220 535 C1150 640 1020 710 960 755"/>
  <path class="arrow" d="M800 585 C810 665 850 720 890 755"/>
  <path class="arrow" d="M1010 585 C995 665 975 720 950 755"/>
  <path class="arrow" d="M1220 645 C1145 700 1040 735 980 755"/>
  <path class="arrow" d="M800 695 C830 725 860 745 890 755"/>
  <path class="arrow" d="M1018 695 C1048 725 1075 755 1120 802"/>
  <path class="arrow" d="M1018 695 C985 720 955 742 935 755"/>
  <path class="arrow" d="M1120 808 C1085 780 1060 735 1062 670"/>
  <text class="tiny" x="760" y="900">Each Spring service uses its own database schema inside the shared MySQL container.</text>

  <path class="trace" d="M960 300 L1120 690"/>
  <path class="trace" d="M800 475 L1120 690"/>
  <path class="trace" d="M1010 475 L1120 690"/>
  <path class="trace" d="M1220 535 L1230 655"/>
  <path class="trace" d="M800 585 L1120 690"/>
  <path class="trace" d="M1010 585 L1120 690"/>
  <path class="trace" d="M1220 645 L1230 655"/>
  <path class="trace" d="M800 695 L1120 690"/>
  <path class="trace" d="M1018 695 L1120 690"/>

  <rect x="65" y="910" width="1370" height="44" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="small" x="90" y="938">Runtime support: RabbitMQ handles notification events, Eureka handles service lookup, Config Server centralizes configuration, and Zipkin collects distributed traces.</text>
</svg>
