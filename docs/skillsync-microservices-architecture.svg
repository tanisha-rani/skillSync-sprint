    <ellipse class="db" cx="1440" cy="800" rx="78" ry="20"/>
    <text class="small" x="1394" y="842">review_db</text>

    <path class="db" d="M1567 800 C1567 780 1723 780 1723 800 L1723 868 C1723 888 1567 888 1567 868 Z"/>
    <ellipse class="db" cx="1645" cy="800" rx="78" ry="20"/>
    <text class="small" x="1580" y="842">notifications_db</text>
