  <path class="trace" d="M1645 668 L1585 505"/>
  <path class="trace" d="M1440 668 L1585 505"/>
  <path class="trace" d="M1030 668 L1585 505"/>
  <path class="trace" d="M825 668 L1585 505"/>
  <path class="trace" d="M620 668 L1585 505"/>
  <path class="trace" d="M415 668 L1585 505"/>
  <path class="trace" d="M210 668 L1585 505"/>
  <path class="trace" d="M900 300 L1585 410"/>
  <text class="tiny" x="1490" y="535" fill="#6d28d9">Micrometer/Zipkin spans</text>

  <rect x="65" y="990" width="1670" height="70" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="small" x="95" y="1032">Security: public /auth routes issue JWTs. Gateway JWT filter protects /users, /mentors, /skills, /groups, /sessions, /reviews, and /notifications routes.</text>
</svg>
