      - ./notificationservice:/workspace
      - maven-repo:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/notifications_db?createDatabaseIfNotExist=true
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_MAIL_HOST: sandbox.smtp.mailtrap.io
      SPRING_MAIL_PORT: 2525
      SPRING_MAIL_USERNAME: bd75d4b1fb1194
      SPRING_MAIL_PASSWORD: 0af8cb94fe484c
      APP_MAIL_FROM: no-reply@skillsync.local
      SERVER_PORT: 8089
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JWT_SECRET: mysecretkeymysecretleymysecretkey32
    ports:
      - "8089:8089"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      discovery-server:
        condition: service_started

  apigateway:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: skillsync-gateway
    working_dir: /workspace
