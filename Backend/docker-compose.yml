services:
  mysql:
    image: mysql:8.4
    container_name: skillsync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: tanisha
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptanisha"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: skillsync-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: skillsync-zipkin
    ports:
      - "9411:9411"

  discovery-server:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: skillsync-discovery
    working_dir: /workspace
    command: mvn spring-boot:run
    volumes:
      - ./discovery-server:/workspace
      - maven-repo:/root/.m2
    ports:
      - "8761:8761"
    depends_on:
      - zipkin

  authservice:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: skillsync-auth
    working_dir: /workspace
    command: mvn spring-boot:run
    volumes:
      - ./authservice:/workspace
      - maven-repo:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3307/auth_db?createDatabaseIfNotExist=true
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JWT_SECRET: mysecretkeymysecretleymysecretkey32
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started

  userservice:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: skillsync-user
    working_dir: /workspace
    command: mvn spring-boot:run
    volumes:
      - ./userservice:/workspace
      - maven-repo:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3307/users_db?createDatabaseIfNotExist=true
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JWT_SECRET: mysecretkeymysecretleymysecretkey32
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started

  mentor:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: skillsync-mentor
    working_dir: /workspace
    command: mvn spring-boot:run
    volumes:
      - ./mentor:/workspace
      - maven-repo:/root/.m2
