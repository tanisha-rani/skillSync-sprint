      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JWT_SECRET: mysecretkeymysecretleymysecretkey32
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_started
      authservice:
        condition: service_started
      userservice:
        condition: service_started
      mentor:
        condition: service_started
      skillservice:
        condition: service_started
      sessionservice:
        condition: service_started
      groupservice:
        condition: service_started
      review-service:
        condition: service_started
      notificationservice:
        condition: service_started

volumes:
  mysql-data:
  maven-repo:
