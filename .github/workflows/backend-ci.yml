name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-backend:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - Backend/discovery-server
          - Backend/config-server
          - Backend/apigateway
          - Backend/authservice
          - Backend/userservice
          - Backend/mentor
          - Backend/skillService
          - Backend/sessionservice
          - Backend/groupservice
          - Backend/review-service
          - Backend/notificationservice

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn clean test
